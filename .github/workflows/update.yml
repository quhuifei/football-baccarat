name: 每日更新赛果

on:
  schedule:
    # 每天 08:20 北京时间（00:20 UTC）运行
    - cron: "20 0 * * *"
  workflow_dispatch: {} # 允许在 Actions 页面手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 抓取最新赛果
        run: python update_scores.py

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add football_latest.json football_latest.js team_cn.json
          if git diff --cached --quiet; then
            echo "没有新变化，跳过提交"
          else
            git commit -m "chore: 自动更新赛果 $(date -u +%Y-%m-%d)"
            git push
          fi
