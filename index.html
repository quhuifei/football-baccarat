<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>五大联赛 · 百家乐路单</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #d4af37;
    --gold-bright: #f0d57a;
    --gold-line: rgba(212, 175, 55, 0.18);
    --txt: #e9e7de;
    --muted: #8fa39b;
    --panel: rgba(15, 32, 27, 0.72);
    --panel-solid: #0e1f1a;
    --banker: #ff6b6b;
    --player: #5eb0f8;
    --tie: #3fd3b6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  ::selection { background: rgba(212, 175, 55, 0.35); color: #fff; }
  html { scrollbar-color: rgba(212, 175, 55, 0.3) transparent; }
  *::-webkit-scrollbar { width: 9px; height: 9px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb {
    background: rgba(212, 175, 55, 0.25);
    border-radius: 99px;
    border: 2px solid transparent;
    background-clip: padding-box;
  }
  *::-webkit-scrollbar-thumb:hover { background: rgba(212, 175, 55, 0.45); background-clip: padding-box; }
  body {
    font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background:
      radial-gradient(1100px 550px at 50% -8%, rgba(212, 175, 55, 0.08), transparent 62%),
      radial-gradient(900px 520px at 88% 8%, rgba(42, 157, 143, 0.09), transparent 60%),
      radial-gradient(1000px 700px at 8% 92%, rgba(24, 68, 110, 0.22), transparent 60%),
      linear-gradient(180deg, #0b211a 0%, #071510 46%, #050d0a 100%);
    background-attachment: fixed;
    color: var(--txt);
    padding: 18px 12px 10px;
    min-height: 100vh;
  }
  :focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
    border-radius: 6px;
  }
  @keyframes riseIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: none; }
  }
  .container {
    max-width: none;
    margin: 0 auto;
    position: relative;
  }
  h1 {
    text-align: center;
    margin-bottom: 4px;
    font-family: "Oswald", "Noto Sans SC", sans-serif;
    font-size: 32px;
    font-weight: 600;
    letter-spacing: 5px;
    background: linear-gradient(180deg, #f7e9b8 0%, var(--gold) 58%, #96781d 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 2px 10px rgba(212, 175, 55, 0.22));
  }
  h1::after {
    content: '';
    display: block;
    width: 150px;
    height: 1px;
    margin: 10px auto 0;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    box-shadow: 0 0 8px rgba(212, 175, 55, 0.5);
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    margin-bottom: 14px;
    font-size: 13px;
    letter-spacing: 1px;
  }
  .controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 14px;
    margin: 0 auto 14px;
    padding: 12px 20px;
    width: fit-content;
    max-width: 100%;
    flex-wrap: wrap;
    background: var(--panel);
    border: 1px solid var(--gold-line);
    border-radius: 14px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 8px 28px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    animation: riseIn 0.45s ease both;
  }
  .year-select {
    appearance: none;
    -webkit-appearance: none;
    padding: 9px 36px 9px 14px;
    border: 1px solid rgba(212, 175, 55, 0.28);
    background: rgba(8, 20, 16, 0.85) url('data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2212%22%20height%3D%2212%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23d4af37%22%20stroke-width%3D%222.4%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpath%20d%3D%22M6%209l6%206%206-6%22%2F%3E%3C%2Fsvg%3E') no-repeat right 13px center;
    color: var(--txt);
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    min-width: 140px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .year-select:hover { border-color: rgba(212, 175, 55, 0.55); }
  .year-select:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.16);
  }
  .year-select option {
    background: #0c1a15;
    color: var(--txt);
  }
  .export-btn {
    padding: 9px 16px;
    border: 1px solid rgba(212, 175, 55, 0.35);
    background: rgba(8, 20, 16, 0.7);
    color: var(--txt);
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .export-btn:hover {
    border-color: var(--gold);
    box-shadow: 0 0 14px rgba(212, 175, 55, 0.22);
    transform: translateY(-1px);
  }
  .legend {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 26px;
    margin: 0 auto 14px;
    padding: 8px 24px;
    width: fit-content;
    max-width: 100%;
    flex-wrap: wrap;
    background: var(--panel);
    border: 1px solid var(--gold-line);
    border-radius: 999px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    animation: riseIn 0.45s ease 0.04s both;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
  }
  .legend-circle {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.35);
  }
  .banker { background: radial-gradient(circle at 32% 28%, #ff8585, #d62f3a 60%, #a11d25); }
  .player { background: radial-gradient(circle at 32% 28%, #74c0fc, #1971c2 60%, #125094); border-color: rgba(255, 255, 255, 0.3); }
  .tie { background: radial-gradient(circle at 32% 28%, #63e6be, #2a9d8f 60%, #1d6f64); }
  .tie-slash {
    width: 22px;
    height: 22px;
    position: relative;
  }
  .tie-slash::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 10%;
    width: 80%;
    height: 3px;
    background: var(--tie);
    transform: rotate(-45deg);
    transform-origin: center;
    box-shadow: 0 0 6px rgba(63, 211, 182, 0.8);
    border-radius: 2px;
  }
  .road-wrapper {
    overflow-x: auto;
    background: linear-gradient(180deg, rgba(13, 30, 24, 0.92), rgba(7, 16, 13, 0.95));
    border: 1px solid rgba(212, 175, 55, 0.22);
    border-radius: 14px;
    padding: 12px;
    box-shadow: 0 10px 34px rgba(0, 0, 0, 0.45), inset 0 2px 22px rgba(0, 0, 0, 0.55);
    margin-bottom: 14px;
    animation: riseIn 0.5s ease 0.08s both;
  }
  .road {
    display: grid;
    gap: 2px;
    min-width: fit-content;
  }
  .cell {
    width: 40px;
    height: 40px;
    background: rgba(255, 255, 255, 0.028);
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: pointer;
    transition: background 0.15s;
  }
  .cell:hover {
    background: rgba(212, 175, 55, 0.09);
  }
  .cell-circle {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Oswald", "Noto Sans SC", sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.65);
    border: 2px solid rgba(255, 255, 255, 0.32);
    box-shadow: 0 3px 9px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.4);
    transition: transform 0.16s ease, box-shadow 0.16s ease;
  }
  .cell-circle:hover {
    transform: scale(1.14);
    box-shadow: 0 5px 16px rgba(0, 0, 0, 0.55), 0 0 14px rgba(212, 175, 55, 0.35), inset 0 1px 2px rgba(255, 255, 255, 0.45);
    z-index: 5;
    position: relative;
  }
  .cell-B { background: radial-gradient(circle at 32% 28%, #ff8585, #d62f3a 58%, #a11d25); }
  .cell-P { background: radial-gradient(circle at 32% 28%, #74c0fc, #1971c2 58%, #125094); }
  .cell-T { background: radial-gradient(circle at 32% 28%, #63e6be, #2a9d8f 58%, #1d6f64); }
  .cell-tie {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
  }
  .cell-tie-line {
    position: absolute;
    top: 50%;
    left: 12%;
    width: 76%;
    height: 3px;
    background: #2a9d8f;
    transform-origin: center;
    box-shadow: 0 0 5px #2a9d8f, 0 0 9px rgba(42, 157, 143, 0.7);
    border-radius: 2px;
    pointer-events: auto;
    cursor: pointer;
    transition: background 0.15s, box-shadow 0.15s;
  }
  .cell-tie-line:hover {
    background: #63e6be;
    box-shadow: 0 0 8px #2a9d8f, 0 0 14px rgba(42, 157, 143, 0.9);
  }
  .cell-tie-badge {
    position: absolute;
    bottom: 2px;
    right: 2px;
    background: #2a9d8f;
    color: #fff;
    font-size: 9px;
    font-weight: bold;
    padding: 1px 4px;
    border-radius: 3px;
    z-index: 20;
    box-shadow: 0 0 4px rgba(0, 0, 0, 0.5);
    pointer-events: none;
  }
  .tooltip {
    position: fixed;
    background: rgba(8, 19, 15, 0.94);
    border: 1px solid rgba(212, 175, 55, 0.32);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--txt);
    font-size: 12px;
    line-height: 1.6;
    pointer-events: none;
    z-index: 1000;
    max-width: 320px;
    box-shadow: 0 10px 34px rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: none;
  }
  .tooltip .match-row {
    margin-bottom: 4px;
    padding-bottom: 4px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.07);
  }
  .tooltip .match-row:last-child {
    margin-bottom: 0;
    padding-bottom: 0;
    border-bottom: none;
  }
  .tooltip .match-date {
    color: var(--gold);
    font-weight: bold;
  }
  .tooltip .result-B { color: var(--banker); }
  .tooltip .result-P { color: var(--player); }
  .tooltip .result-T { color: var(--tie); }
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 15px;
    animation: riseIn 0.5s ease 0.05s both;
  }
  .stat-card {
    position: relative;
    background: linear-gradient(160deg, rgba(21, 42, 35, 0.9), rgba(9, 20, 16, 0.92));
    padding: 18px 15px 15px;
    border-radius: 14px;
    text-align: center;
    border: 1px solid rgba(212, 175, 55, 0.15);
    box-shadow: 0 6px 22px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 18%;
    right: 18%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.65), transparent);
  }
  .stat-card:hover {
    transform: translateY(-3px);
    border-color: rgba(212, 175, 55, 0.4);
    box-shadow: 0 14px 34px rgba(0, 0, 0, 0.5), 0 0 18px rgba(212, 175, 55, 0.12);
  }
  .stat-number {
    font-family: "Oswald", "Noto Sans SC", sans-serif;
    font-size: 34px;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .stat-label {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 1px;
  }
  .match-list {
    background: linear-gradient(180deg, rgba(15, 32, 27, 0.85), rgba(8, 18, 14, 0.9));
    border: 1px solid var(--gold-line);
    border-radius: 14px;
    padding: 14px;
    max-height: 600px;
    overflow-y: auto;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    animation: riseIn 0.5s ease 0.12s both;
  }
  .match-list h2 {
    font-size: 17px;
    margin-bottom: 10px;
    color: var(--gold);
    font-family: "Oswald", "Noto Sans SC", sans-serif;
    letter-spacing: 2px;
  }
  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 13px;
  }
  th, td {
    padding: 7px 9px;
    text-align: left;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }
  th {
    color: var(--gold);
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 1px;
    position: sticky;
    top: -14px;
    background: #0d1e18;
    z-index: 3;
    border-bottom: 1px solid rgba(212, 175, 55, 0.3);
  }
  tbody tr:nth-child(even) td { background: rgba(255, 255, 255, 0.022); }
  tbody tr:hover td { background: rgba(212, 175, 55, 0.07); }
  .result-B { color: var(--banker); font-weight: bold; }
  .result-P { color: var(--player); font-weight: bold; }
  .result-T { color: var(--tie); font-weight: bold; }
  td.result-B, td.result-P, td.result-T { color: transparent; position: relative; }
  td.result-B::before, td.result-P::before, td.result-T::before {
    position: absolute;
    left: 9px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    font-weight: 700;
    padding: 2px 11px;
    border-radius: 999px;
    letter-spacing: 1px;
  }
  td.result-B::before {
    content: '庄';
    color: #ff8585;
    background: rgba(214, 47, 58, 0.16);
    border: 1px solid rgba(214, 47, 58, 0.42);
  }
  td.result-P::before {
    content: '闲';
    color: #74c0fc;
    background: rgba(25, 113, 194, 0.16);
    border: 1px solid rgba(94, 176, 248, 0.4);
  }
  td.result-T::before {
    content: '和';
    color: #63e6be;
    background: rgba(42, 157, 143, 0.16);
    border: 1px solid rgba(63, 211, 182, 0.4);
  }
  .year-separator td {
    background: rgba(212, 175, 55, 0.1) !important;
    color: var(--gold);
    font-weight: 700;
    text-align: center;
    letter-spacing: 3px;
    padding: 6px;
    border-bottom: 1px solid rgba(212, 175, 55, 0.25);
  }
  tbody tr.year-separator:hover td { background: rgba(212, 175, 55, 0.14) !important; }
  .footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    margin-top: 30px;
    padding-top: 14px;
    border-top: 1px solid rgba(212, 175, 55, 0.12);
    letter-spacing: 0.5px;
  }
  @media (max-width: 640px) {
    body { padding: 12px 8px 8px; }
    h1 { font-size: 23px; letter-spacing: 3px; }
    .controls { gap: 10px; padding: 10px 14px; }
    .stats { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .stat-number { font-size: 28px; }
    .legend { gap: 14px; padding: 8px 16px; }
    .legend-item { font-size: 12px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1 id="page-title">五大联赛 · 百家乐路单</h1>
  <div class="subtitle" id="subtitle">选择赛事、赛季和显示模式 · v3.0</div>

  <div class="controls">
    <label for="league-select" style="color:#778da9;font-size:14px;">选择赛事：</label>
    <select class="year-select" id="league-select" onchange="setLeague(this.value)">
      <option value="E0">英超</option>
      <option value="SP1">西甲</option>
      <option value="D1">德甲</option>
      <option value="I1">意甲</option>
      <option value="F1">法甲</option>
    </select>

    <span id="season-wrapper">
      <label for="season-select" style="color:#778da9;font-size:14px;">选择赛季：</label>
      <select class="year-select" id="season-select" onchange="setSeason(this.value)">
        <option value="all">全部赛季</option>
      </select>
    </span>
  </div>

  <div class="legend" id="legend">
    <div class="legend-item"><div class="legend-circle banker"></div>庄（主队胜）</div>
    <div class="legend-item"><div class="legend-circle player"></div>闲（客队胜）</div>
    <div class="legend-item"><div class="tie-slash"></div>和（平局）— 斜杠叠加</div>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="stat-number" style="color:#ff6b6b" id="stat-b">0</div><div class="stat-label">庄（主队胜）</div></div>
    <div class="stat-card"><div class="stat-number" style="color:#4dabf7" id="stat-p">0</div><div class="stat-label">闲（客队胜）</div></div>
    <div class="stat-card"><div class="stat-number" style="color:#4dd0a8" id="stat-t">0</div><div class="stat-label">和（平局）</div></div>
    <div class="stat-card"><div class="stat-number" style="color:#ffd700" id="stat-total">0</div><div class="stat-label">总场次</div></div>
  </div>

  <div class="road-wrapper" id="single-road-wrapper">
    <div class="road" id="road"></div>
  </div>

  <div class="match-list">
    <h2>完整赛果列表</h2>
    <table>
      <thead><tr><th>#</th><th>年份</th><th>日期</th><th>左队（庄）</th><th>比分</th><th>右队（闲）</th><th>结果</th></tr></thead>
      <tbody id="match-table-body">
      </tbody>
    </table>
  </div>

  <div class="subtitle" id="api-status" style="font-size:12px;color:#4dd0a8;min-height:18px;margin-top:18px;">正在加载五大联赛历史数据...</div>

  <div class="footer" id="footer">数据来源：football-data.co.uk · 五大联赛 2014-2026</div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
// 五大联赛数据（启动时从 matches.js 加载，再由 football_latest.js 合并增量）
const allData = {};

let currentLeague = 'E0';
let currentSeason = 'all';
const resultLabels = {'B': '庄', 'P': '闲', 'T': '和'};

// 赛季起始年 "2014" -> "2014-15" 显示格式
function fmtSeason(y) {
  const n = parseInt(y, 10);
  if (isNaN(n)) return y;
  return n + '-' + String((n + 1) % 100).padStart(2, '0');
}

function getCurrentMatches() {
  return (allData[currentLeague] ? allData[currentLeague].matches : []).map((m, i) => ({...m, _idx: i, _league: currentLeague}));
}

function getFilteredMatches() {
  let seq = 0;
  const base = getCurrentMatches();
  return base.filter(m => {
    if (currentSeason === 'all') return true;
    return m.season === currentSeason;
  }).map(m => ({...m, _seq: seq++}));
}

function generateStandardRoad(results, maxRows = 6) {
  const grid = {};
  const cellMatches = {};
  let lastPos = null;
  let currentCol = -1;
  let pendingTies = [];

  results.forEach((r) => {
    const res = r.result;
    const ref = { idx: r._idx, seq: r._seq };
    if (res === 'T') {
      if (lastPos) {
        const key = lastPos.join(',');
        cellMatches[key] = cellMatches[key] || [];
        cellMatches[key].push(ref);
      } else {
        pendingTies.push(ref);
      }
      return;
    }

    if (Object.keys(grid).length === 0) {
      currentCol = 0;
      grid['0,0'] = res;
      lastPos = [0, 0];
      cellMatches['0,0'] = [ref, ...pendingTies];
      pendingTies = [];
      return;
    }

    const lastRes = grid[lastPos.join(',')];
    if (res === lastRes) {
      const [col, row] = lastPos;
      let newRow = row + 1;
      while (newRow < maxRows && grid[col + ',' + newRow]) newRow++;
      if (newRow < maxRows && !grid[col + ',' + newRow]) {
        grid[col + ',' + newRow] = res;
        lastPos = [col, newRow];
        cellMatches[col + ',' + newRow] = [ref];
      } else {
        let newCol = col + 1;
        while (grid[newCol + ',' + row]) newCol++;
        grid[newCol + ',' + row] = res;
        lastPos = [newCol, row];
        cellMatches[newCol + ',' + row] = [ref];
      }
    } else {
      const newCol = currentCol + 1;
      grid[newCol + ',0'] = res;
      lastPos = [newCol, 0];
      currentCol = newCol;
      cellMatches[newCol + ',0'] = [ref];
    }
  });

  if (pendingTies.length > 0 && Object.keys(grid).length === 0) {
    grid['0,0'] = 'T';
    lastPos = [0, 0];
    cellMatches['0,0'] = pendingTies;
  }

  return { grid, cellMatches };
}

function getTooltipContent(refs) {
  return refs.map(ref => {
    const league = ref._league || currentLeague;
    const m = allData[league].matches[ref.idx];
    const label = resultLabels[m.result];
    const cls = 'result-' + m.result;
    return `<div class="match-row">
      <div class="match-date">#${ref.seq + 1} · ${m.date}</div>
      <div>${m.team1_cn} ${m.s1}–${m.s2} ${m.team2_cn} <span class="${cls}">[${label}]</span></div>
    </div>`;
  }).join('');
}

function renderRoadInto(roadEl, matches, league) {
  const roadData = generateStandardRoad(matches);

  const grid = roadData.grid;
  const cellMatches = roadData.cellMatches;

  let maxCol = 0, maxRow = 0;
  for (const key in grid) {
    const [c, r] = key.split(',').map(Number);
    maxCol = Math.max(maxCol, c);
    maxRow = Math.max(maxRow, r);
  }

  roadEl.style.gridTemplateColumns = `repeat(${maxCol + 1}, 40px)`;
  roadEl.style.gridTemplateRows = `repeat(${maxRow + 1}, 40px)`;
  roadEl.innerHTML = '';

  for (let r = 0; r <= maxRow; r++) {
    for (let c = 0; c <= maxCol; c++) {
      const key = c + ',' + r;
      const cell = document.createElement('div');
      cell.className = 'cell';

      if (grid[key]) {
        const circle = document.createElement('div');
        circle.className = 'cell-circle cell-' + grid[key];
        circle.textContent = grid[key];
        cell.appendChild(circle);

        const refs = cellMatches[key] || [];
        const mainRef = refs[0];
        const tieRefs = refs.slice(1).filter(ref => allData[league].matches[ref.idx].result === 'T');

        // tooltip 显示该单元格所有相关比赛（包括和局）
        const tooltipRefs = refs;
        if (mainRef !== undefined) {
          circle.addEventListener('mouseenter', (e) => showTooltip(e, tooltipRefs));
          circle.addEventListener('mousemove', moveTooltip);
          circle.addEventListener('mouseleave', hideTooltip);
        }

        // 显示和局斜杠（叠加在庄/闲格上）
        const tieCount = tieRefs.length;
        const maxVisible = 4;
        const visibleCount = Math.min(tieCount, maxVisible);

        // 根据和局数量动态调整斜杠长度/角度，防止过多时溢出或重叠
        const lineWidth = tieCount >= 4 ? '64%' : '76%';
        const lineLeft = tieCount >= 4 ? '18%' : '12%';
        const angleStep = tieCount <= 2 ? 35 : (tieCount <= 3 ? 23 : 20);
        const startAngle = tieCount <= 2 ? -27 : (tieCount <= 3 ? -22 : -18);
        const offsetStep = tieCount >= 4 ? 2.5 : 3.5;

        tieRefs.forEach((ref, i) => {
          if (i >= maxVisible) return;
          const slash = document.createElement('div');
          slash.className = 'cell-tie';
          const line = document.createElement('div');
          line.className = 'cell-tie-line';
          const angle = startAngle - (i * angleStep);
          const offset = (i - (visibleCount - 1) / 2) * offsetStep;
          line.style.width = lineWidth;
          line.style.left = lineLeft;
          line.style.transform = `rotate(${angle}deg) translateY(${offset}px)`;
          line.addEventListener('mouseenter', (e) => showTooltip(e, [ref]));
          line.addEventListener('mousemove', moveTooltip);
          line.addEventListener('mouseleave', hideTooltip);
          slash.appendChild(line);
          cell.appendChild(slash);
        });

        // 超过显示上限时添加 +N 角标
        if (tieCount > maxVisible) {
          const badge = document.createElement('div');
          badge.className = 'cell-tie-badge';
          badge.textContent = '+' + (tieCount - maxVisible);
          cell.appendChild(badge);
        }
      }

      roadEl.appendChild(cell);
    }
  }
}

function renderRoad() {
  renderRoadInto(document.getElementById('road'), getFilteredMatches(), currentLeague);
}

const tooltip = document.getElementById('tooltip');

function showTooltip(e, refs) {
  tooltip.innerHTML = getTooltipContent(refs);
  tooltip.style.display = 'block';
  moveTooltip(e);
}

function moveTooltip(e) {
  const x = e.clientX + 15;
  const y = e.clientY + 15;
  const rect = tooltip.getBoundingClientRect();
  const winW = window.innerWidth;
  const winH = window.innerHeight;
  let finalX = x;
  let finalY = y;
  if (finalX + rect.width > winW) finalX = e.clientX - rect.width - 10;
  if (finalY + rect.height > winH) finalY = e.clientY - rect.height - 10;
  tooltip.style.left = finalX + 'px';
  tooltip.style.top = finalY + 'px';
}

function hideTooltip() {
  tooltip.style.display = 'none';
}

function setSeason(season) {
  currentSeason = season;
  renderAll();
}

function populateSeasonSelect() {
  const select = document.getElementById('season-select');
  while (select.options.length > 1) {
    select.remove(1);
  }
  if (!allData[currentLeague]) return;
  const years = [...new Set(allData[currentLeague].matches.map(m => m.season))].sort();
  years.forEach(y => {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = fmtSeason(y) + ' 赛季';
    select.appendChild(opt);
  });
}

function setLeague(league) {
  currentLeague = league;
  currentSeason = 'all';

  document.getElementById('season-select').value = 'all';

  populateSeasonSelect();

  updatePageInfo();
  renderAll();
}

function renderStats() {
  const filtered = getFilteredMatches();
  const counts = { B: 0, P: 0, T: 0 };
  for (const m of filtered) counts[m.result]++;
  document.getElementById('stat-b').textContent = counts.B;
  document.getElementById('stat-p').textContent = counts.P;
  document.getElementById('stat-t').textContent = counts.T;
  document.getElementById('stat-total').textContent = filtered.length;
}

function renderTable() {
  const filtered = getFilteredMatches();
  const tbody = document.getElementById('match-table-body');
  tbody.innerHTML = '';
  let lastGroup = '';
  filtered.forEach((m, i) => {
    const year = m.date.split('-')[0];
    const groupLabel = year + ' 年';
    if (currentSeason === 'all' && year !== lastGroup) {
      const sep = document.createElement('tr');
      sep.className = 'year-separator';
      sep.innerHTML = `<td colspan="7">${groupLabel}</td>`;
      tbody.appendChild(sep);
      lastGroup = year;
    }
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${i + 1}</td><td>${year}</td><td>${m.date}</td><td>${m.team1_cn}</td><td>${m.s1}–${m.s2}</td><td>${m.team2_cn}</td><td class="result-${m.result}">${resultLabels[m.result]}</td>`;
    tbody.appendChild(tr);
  });
}

function updatePageInfo() {
  const leagueInfo = allData[currentLeague];
  if (!leagueInfo) return;
  document.getElementById('page-title').textContent = leagueInfo.cn + ' · 百家乐路单';
  document.getElementById('footer').textContent =
    '数据来源：football-data.co.uk · 五大联赛 2014-2026 · ' + leagueInfo.cn + ' 共 ' + leagueInfo.matches.length + ' 场比赛';
}

function renderAll() {
  renderRoad();
  renderStats();
  renderTable();
}

// 通过 <script> 标签加载数据文件（兼容 file:// 直接双击打开，浏览器不限制 script src）
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src + '?_=' + Date.now();
    s.onload = () => resolve();
    s.onerror = () => reject(new Error('无法加载 ' + src));
    document.head.appendChild(s);
  });
}

// 启动时加载五大联赛基础数据（matches.js -> window.MATCHES_DATA）
async function loadBaseData() {
  const statusEl = document.getElementById('api-status');
  await loadScript('matches.js');
  const data = window.MATCHES_DATA;
  if (!data || typeof data !== 'object') {
    throw new Error('matches.js 中未找到 MATCHES_DATA');
  }
  ['E0', 'SP1', 'D1', 'I1', 'F1'].forEach(k => {
    if (data[k] && Array.isArray(data[k].matches)) {
      allData[k] = data[k];
    }
  });
  if (Object.keys(allData).length === 0) {
    throw new Error('matches.js 数据为空或格式不正确');
  }
  statusEl.textContent = '正在检查本地最新战绩数据...';
}

// 加载 update_scores.py 生成的最新战绩（football_latest.js -> window.LATEST_DATA），并合并到现有数据中
async function loadLatestData() {
  const statusEl = document.getElementById('api-status');
  try {
    await loadScript('football_latest.js');
    const data = window.LATEST_DATA;
    if (!data || !Array.isArray(data.matches)) {
      throw new Error('数据格式不正确');
    }

    let added = 0;
    let updated = 0;

    data.matches.forEach(m => {
      const league = m._league;
      if (!allData[league]) return;

      // 用 日期+主队+客队 作为唯一键去重
      const key = `${m.date}|${m.team1}|${m.team2}`;
      const existingIdx = allData[league].matches.findIndex(
        ex => `${ex.date}|${ex.team1}|${ex.team2}` === key
      );

      if (existingIdx >= 0) {
        // 已存在则更新比分/结果
        allData[league].matches[existingIdx] = { ...allData[league].matches[existingIdx], ...m };
        updated++;
      } else {
        // 不存在则追加
        allData[league].matches.push(m);
        added++;
      }
    });

    // 按日期排序
    Object.keys(allData).forEach(k => {
      allData[k].matches.sort((a, b) => new Date(a.date) - new Date(b.date));
    });

    const updatedTime = data.updated_at
      ? new Date(data.updated_at).toLocaleString('zh-CN')
      : '未知时间';
    statusEl.textContent = `✅ 已加载最新战绩（${data.matches.length} 条，新增 ${added}，更新 ${updated}）· 更新时间：${updatedTime}`;
  } catch (err) {
    statusEl.textContent = 'ℹ️ 未检测到 football_latest.js，使用基础历史数据。运行 update_scores.py 可生成最新战绩。';
    console.log('加载最新数据失败:', err.message);
  }
}

async function initApp() {
  const statusEl = document.getElementById('api-status');
  try {
    await loadBaseData();
  } catch (err) {
    statusEl.textContent = '❌ 无法加载 matches.js 基础数据（' + err.message + '）。请确认 matches.js 与本页面在同一目录。';
    statusEl.style.color = '#ff6b6b';
    console.error('加载基础数据失败:', err);
    return;
  }
  await loadLatestData();
  populateSeasonSelect();
  updatePageInfo();
  renderAll();
}

initApp();
