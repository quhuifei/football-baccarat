<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>全球27国联赛 · 赛果路图</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #d4af37;
    --gold-bright: #f0d57a;
    --gold-line: rgba(212, 175, 55, 0.18);
    --txt: #e9e7de;
    --muted: #8fa39b;
    --panel: rgba(15, 32, 27, 0.72);
    --panel-solid: #0e1f1a;
    --banker: #ff6b6b;
    --player: #5eb0f8;
    --tie: #3fd3b6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  ::selection { background: rgba(212, 175, 55, 0.35); color: #fff; }
  html { scrollbar-color: rgba(212, 175, 55, 0.3) transparent; }
  *::-webkit-scrollbar { width: 9px; height: 9px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb {
    background: rgba(212, 175, 55, 0.25);
    border-radius: 99px;
    border: 2px solid transparent;
    background-clip: padding-box;
  }
  *::-webkit-scrollbar-thumb:hover { background: rgba(212, 175, 55, 0.45); background-clip: padding-box; }
  body {
    font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background:
      radial-gradient(1100px 550px at 50% -8%, rgba(212, 175, 55, 0.08), transparent 62%),
      radial-gradient(900px 520px at 88% 8%, rgba(42, 157, 143, 0.09), transparent 60%),
      radial-gradient(1000px 700px at 8% 92%, rgba(24, 68, 110, 0.22), transparent 60%),
      linear-gradient(180deg, #0b211a 0%, #071510 46%, #050d0a 100%);
    background-attachment: fixed;
    color: var(--txt);
    padding: 18px 12px 10px;
    min-height: 100vh;
  }
  :focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
    border-radius: 6px;
  }
  @keyframes riseIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: none; }
  }
  .container {
    max-width: none;
    margin: 0 auto;
    position: relative;
  }
  h1 {
    text-align: center;
    margin-bottom: 4px;
    font-family: "Oswald", "Noto Sans SC", sans-serif;
    font-size: 32px;
    font-weight: 600;
    letter-spacing: 5px;
    background: linear-gradient(180deg, #f7e9b8 0%, var(--gold) 58%, #96781d 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 2px 10px rgba(212, 175, 55, 0.22));
  }
  h1::after {
    content: '';
    display: block;
    width: 150px;
    height: 1px;
    margin: 10px auto 0;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    box-shadow: 0 0 8px rgba(212, 175, 55, 0.5);
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    margin-bottom: 14px;
    font-size: 13px;
    letter-spacing: 1px;
  }
  .controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 14px;
    margin: 0 auto 14px;
    padding: 12px 20px;
    width: fit-content;
    max-width: 100%;
    flex-wrap: wrap;
    background: var(--panel);
    border: 1px solid var(--gold-line);
    border-radius: 14px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 8px 28px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    animation: riseIn 0.45s ease both;
  }
  .year-select {
    appearance: none;
    -webkit-appearance: none;
    padding: 9px 36px 9px 14px;
    border: 1px solid rgba(212, 175, 55, 0.28);
    background: rgba(8, 20, 16, 0.85) url('data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2212%22%20height%3D%2212%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23d4af37%22%20stroke-width%3D%222.4%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpath%20d%3D%22M6%209l6%206%206-6%22%2F%3E%3C%2Fsvg%3E') no-repeat right 13px center;
    color: var(--txt);
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    min-width: 140px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .year-select:hover { border-color: rgba(212, 175, 55, 0.55); }
  .year-select:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.16);
  }
  .year-select option {
    background: #0c1a15;
    color: var(--txt);
  }
  /* ===== 联赛选择器 ===== */
  .league-btn {
    text-align: left;
    min-width: 190px;
    cursor: pointer;
    font-family: inherit;
  }
  .league-btn .lb-en { color: var(--muted); font-size: 12px; margin-left: 4px; }
  .league-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(4, 10, 8, 0.72);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .league-overlay.open { display: flex; }
  .league-panel {
    width: min(780px, 100%);
    max-height: min(84vh, 720px);
    background: linear-gradient(180deg, #10231c, #0a1712);
    border: 1px solid rgba(212, 175, 55, 0.35);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
    animation: riseIn 0.3s ease both;
  }
  .league-panel-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    border-bottom: 1px solid rgba(212, 175, 55, 0.2);
    color: var(--gold);
    font-weight: 600;
    letter-spacing: 1px;
    font-size: 15px;
  }
  .league-panel-close {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1px solid rgba(212, 175, 55, 0.4);
    background: rgba(212, 175, 55, 0.12);
    color: var(--gold-bright);
    font-size: 13px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .league-panel-body {
    overflow-y: auto;
    padding: 8px 16px 18px;
    -webkit-overflow-scrolling: touch;
  }
  .league-group-title {
    color: var(--gold);
    font-size: 13px;
    letter-spacing: 2px;
    margin: 14px 4px 8px;
  }
  .league-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 8px;
  }
  .league-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border: 1px solid rgba(212, 175, 55, 0.16);
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.03);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .league-item:hover { border-color: var(--gold); background: rgba(212, 175, 55, 0.08); }
  .league-item.active {
    border-color: var(--gold);
    background: rgba(212, 175, 55, 0.14);
    box-shadow: 0 0 12px rgba(212, 175, 55, 0.22);
  }
  .league-item .lflag { font-size: 20px; line-height: 1; }
  .league-item .ltext { display: flex; flex-direction: column; min-width: 0; }
  .league-item .lcn { font-size: 14px; font-weight: 600; white-space: nowrap; }
  .league-item .len {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .league-item .lcount { margin-left: auto; font-size: 11px; color: var(--muted); white-space: nowrap; }
  .export-btn {
    padding: 9px 16px;
    border: 1px solid rgba(212, 175, 55, 0.35);
    background: rgba(8, 20, 16, 0.7);
    color: var(--txt);
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .export-btn:hover {
    border-color: var(--gold);
    box-shadow: 0 0 14px rgba(212, 175, 55, 0.22);
    transform: translateY(-1px);
  }
  .legend {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 26px;
    margin: 0 auto 14px;
    padding: 8px 24px;
    width: fit-content;
    max-width: 100%;
    flex-wrap: wrap;
    background: var(--panel);
    border: 1px solid var(--gold-line);
    border-radius: 999px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    animation: riseIn 0.45s ease 0.04s both;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
  }
  .legend-circle {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.35);
  }
  .banker { background: radial-gradient(circle at 32% 28%, #ff8585, #d62f3a 60%, #a11d25); }
  .player { background: radial-gradient(circle at 32% 28%, #74c0fc, #1971c2 60%, #125094); border-color: rgba(255, 255, 255, 0.3); }
  .tie { background: radial-gradient(circle at 32% 28%, #63e6be, #2a9d8f 60%, #1d6f64); }
  .tie-slash {
    width: 22px;
    height: 22px;
    position: relative;
  }
  .tie-slash::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 10%;
    width: 80%;
    height: 3px;
    background: var(--tie);
    transform: rotate(-45deg);
    transform-origin: center;
    box-shadow: 0 0 6px rgba(63, 211, 182, 0.8);
    border-radius: 2px;
  }
  .road-wrapper {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    background: linear-gradient(180deg, rgba(13, 30, 24, 0.92), rgba(7, 16, 13, 0.95));
    border: 1px solid rgba(212, 175, 55, 0.22);
    border-radius: 14px;
    padding: 12px;
    box-shadow: 0 10px 34px rgba(0, 0, 0, 0.45), inset 0 2px 22px rgba(0, 0, 0, 0.55);
    margin-bottom: 14px;
    animation: riseIn 0.5s ease 0.08s both;
  }
  .road {
    display: grid;
    gap: 2px;
    min-width: fit-content;
  }
  .cell {
    width: 40px;
    height: 40px;
    background: rgba(255, 255, 255, 0.028);
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: pointer;
    transition: background 0.15s;
  }
  .cell:hover {
    background: rgba(212, 175, 55, 0.09);
  }
  .cell-circle {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Oswald", "Noto Sans SC", sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.65);
    border: 2px solid rgba(255, 255, 255, 0.32);
    box-shadow: 0 3px 9px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.4);
    transition: transform 0.16s ease, box-shadow 0.16s ease;
  }
  .cell-circle:hover {
    transform: scale(1.14);
    box-shadow: 0 5px 16px rgba(0, 0, 0, 0.55), 0 0 14px rgba(212, 175, 55, 0.35), inset 0 1px 2px rgba(255, 255, 255, 0.45);
    z-index: 5;
    position: relative;
  }
  .cell-B { background: radial-gradient(circle at 32% 28%, #ff8585, #d62f3a 58%, #a11d25); }
  .cell-P { background: radial-gradient(circle at 32% 28%, #74c0fc, #1971c2 58%, #125094); }
  .cell-T { background: radial-gradient(circle at 32% 28%, #63e6be, #2a9d8f 58%, #1d6f64); }
  .cell-tie {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
  }
  .cell-tie-line {
    position: absolute;
    top: 50%;
    left: 12%;
    width: 76%;
    height: 3px;
    background: #2a9d8f;
    transform-origin: center;
    box-shadow: 0 0 5px #2a9d8f, 0 0 9px rgba(42, 157, 143, 0.7);
    border-radius: 2px;
    pointer-events: auto;
    cursor: pointer;
    transition: background 0.15s, box-shadow 0.15s;
  }
  .cell-tie-line:hover {
    background: #63e6be;
    box-shadow: 0 0 8px #2a9d8f, 0 0 14px rgba(42, 157, 143, 0.9);
  }
  .cell-tie-badge {
    position: absolute;
    bottom: 2px;
    right: 2px;
    background: #2a9d8f;
    color: #fff;
    font-size: 9px;
    font-weight: bold;
    padding: 1px 4px;
    border-radius: 3px;
    z-index: 20;
    box-shadow: 0 0 4px rgba(0, 0, 0, 0.5);
    pointer-events: none;
  }
  .tooltip {
    position: fixed;
    background: rgba(8, 19, 15, 0.94);
    border: 1px solid rgba(212, 175, 55, 0.32);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--txt);
    font-size: 12px;
    line-height: 1.6;
    pointer-events: none;
    z-index: 1000;
    max-width: min(320px, calc(100vw - 24px));
    box-shadow: 0 10px 34px rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: none;
  }
  /* 点击固定（手机端）时可交互，供 ✕ 按钮接收点击 */
  .tooltip.sticky { pointer-events: auto; }
  .tooltip-close {
    display: none;
    position: absolute;
    top: 5px;
    right: 5px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1px solid rgba(212, 175, 55, 0.4);
    background: rgba(212, 175, 55, 0.14);
    color: var(--gold-bright);
    font-size: 12px;
    line-height: 1;
    padding: 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .tooltip .match-row {
    margin-bottom: 4px;
    padding-bottom: 4px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.07);
  }
  .tooltip .match-row:last-child {
    margin-bottom: 0;
    padding-bottom: 0;
    border-bottom: none;
  }
  .tooltip .match-date {
    color: var(--gold);
    font-weight: bold;
  }
  .tooltip .result-B { color: var(--banker); }
  .tooltip .result-P { color: var(--player); }
  .tooltip .result-T { color: var(--tie); }
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 12px;
    animation: riseIn 0.5s ease 0.05s both;
  }
  .stat-card {
    position: relative;
    background: linear-gradient(160deg, rgba(21, 42, 35, 0.9), rgba(9, 20, 16, 0.92));
    padding: 9px 10px 8px;
    border-radius: 10px;
    text-align: center;
    border: 1px solid rgba(212, 175, 55, 0.15);
    box-shadow: 0 6px 22px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 18%;
    right: 18%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.65), transparent);
  }
  .stat-card:hover {
    transform: translateY(-3px);
    border-color: rgba(212, 175, 55, 0.4);
    box-shadow: 0 14px 34px rgba(0, 0, 0, 0.5), 0 0 18px rgba(212, 175, 55, 0.12);
  }
  .stat-number {
    font-family: "Oswald", "Noto Sans SC", sans-serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 2px;
  }
  .stat-label {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 1px;
  }
  .match-list {
    background: linear-gradient(180deg, rgba(15, 32, 27, 0.85), rgba(8, 18, 14, 0.9));
    border: 1px solid var(--gold-line);
    border-radius: 14px;
    padding: 14px;
    max-height: 600px;
    overflow-y: auto;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    animation: riseIn 0.5s ease 0.12s both;
  }
  .match-list h2 {
    font-size: 17px;
    margin-bottom: 10px;
    color: var(--gold);
    font-family: "Oswald", "Noto Sans SC", sans-serif;
    letter-spacing: 2px;
  }
  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 13px;
  }
  th, td {
    padding: 7px 9px;
    text-align: left;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }
  /* 序号 / 年份 / 日期 / 比分列不折行；表头同样不折行 */
  th { white-space: nowrap; }
  td:nth-child(1), td:nth-child(2), td:nth-child(3), td:nth-child(5) { white-space: nowrap; }
  th {
    color: var(--gold);
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 1px;
    position: sticky;
    top: -14px;
    background: #0d1e18;
    z-index: 3;
    border-bottom: 1px solid rgba(212, 175, 55, 0.3);
  }
  tbody tr:nth-child(even) td { background: rgba(255, 255, 255, 0.022); }
  tbody tr:hover td { background: rgba(212, 175, 55, 0.07); }
  .result-B { color: var(--banker); font-weight: bold; }
  .result-P { color: var(--player); font-weight: bold; }
  .result-T { color: var(--tie); font-weight: bold; }
  td.result-B, td.result-P, td.result-T { color: transparent; position: relative; }
  td.result-B::before, td.result-P::before, td.result-T::before {
    position: absolute;
    left: 9px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    font-weight: 700;
    padding: 2px 11px;
    border-radius: 999px;
    letter-spacing: 1px;
  }
  td.result-B::before {
    content: '庄';
    color: #ff8585;
    background: rgba(214, 47, 58, 0.16);
    border: 1px solid rgba(214, 47, 58, 0.42);
  }
  td.result-P::before {
    content: '闲';
    color: #74c0fc;
    background: rgba(25, 113, 194, 0.16);
    border: 1px solid rgba(94, 176, 248, 0.4);
  }
  td.result-T::before {
    content: '和';
    color: #63e6be;
    background: rgba(42, 157, 143, 0.16);
    border: 1px solid rgba(63, 211, 182, 0.4);
  }
  .year-separator td {
    background: rgba(212, 175, 55, 0.1) !important;
    color: var(--gold);
    font-weight: 700;
    text-align: center;
    letter-spacing: 3px;
    padding: 6px;
    border-bottom: 1px solid rgba(212, 175, 55, 0.25);
  }
  tbody tr.year-separator:hover td { background: rgba(212, 175, 55, 0.14) !important; }
  .footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    margin-top: 30px;
    padding-top: 14px;
    border-top: 1px solid rgba(212, 175, 55, 0.12);
    letter-spacing: 0.5px;
  }
  @media (max-width: 640px) {
    body { padding: 12px 8px 8px; }
    h1 { font-size: 23px; letter-spacing: 3px; }
    .controls {
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      padding: 12px 14px;
      width: 100%;
    }
    .controls > label { font-size: 13px; }
    .year-select { width: 100%; min-width: 0; }
    #season-wrapper {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #season-wrapper > label { font-size: 13px; }
    .stats { grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .stat-card { padding: 7px 4px 6px; }
    .stat-number { font-size: 17px; }
    .stat-label { font-size: 10px; letter-spacing: 0; }
    /* 手机端联赛选择器：全屏弹层 */
    .league-overlay { padding: 0; align-items: stretch; justify-content: stretch; }
    .league-panel { width: 100%; max-height: none; height: 100%; border-radius: 0; border: none; }
    .league-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    .league-btn { width: 100%; min-width: 0; }
    .road-wrapper { padding: 10px; }
    /* 手机端 tooltip：显示 ✕ 关闭按钮并留出位置，宽度不超出屏幕 */
    .tooltip { max-width: calc(100vw - 24px); padding-right: 36px; }
    .tooltip.sticky .tooltip-close { display: block; }
    /* 赛果表格手机端更紧凑，宁可横向滚动也不折行 */
    .match-list { padding: 10px; }
    .match-list h2 { font-size: 15px; }
    table { font-size: 12.5px; }
    th, td { padding: 5px 7px; }
    th { top: -10px; font-size: 11.5px; }
    td.result-B::before, td.result-P::before, td.result-T::before {
      left: 7px;
      padding: 1px 8px;
      font-size: 11px;
    }
  }
</style>
</head>
<body>
<div class="container">
  <h1 id="page-title">全球 27 国联赛</h1>
  <div class="subtitle" id="subtitle">27 国 38 项赛事 · 赛果大路图 · v4.0</div>

  <div class="controls">
    <label for="league-btn" style="color:#778da9;font-size:14px;">选择赛事：</label>
    <button type="button" class="year-select league-btn" id="league-btn" onclick="openLeaguePanel()">加载中...</button>

    <span id="season-wrapper">
      <label for="season-select" style="color:#778da9;font-size:14px;">选择赛季：</label>
      <select class="year-select" id="season-select" onchange="setSeason(this.value)">
        <option value="all">全部赛季</option>
      </select>
    </span>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="stat-number" style="color:#ff6b6b" id="stat-b">0</div><div class="stat-label">庄（主队胜）</div></div>
    <div class="stat-card"><div class="stat-number" style="color:#4dabf7" id="stat-p">0</div><div class="stat-label">闲（客队胜）</div></div>
    <div class="stat-card"><div class="stat-number" style="color:#4dd0a8" id="stat-t">0</div><div class="stat-label">和（平局）</div></div>
    <div class="stat-card"><div class="stat-number" style="color:#ffd700" id="stat-total">0</div><div class="stat-label">总场次</div></div>
  </div>

  <div class="road-wrapper" id="single-road-wrapper">
    <div class="road" id="road"></div>
  </div>

  <div class="match-list">
    <h2>完整赛果列表</h2>
    <table>
      <thead><tr><th>#</th><th>年份</th><th>日期</th><th>左队（庄）</th><th>比分</th><th>右队（闲）</th><th>结果</th></tr></thead>
      <tbody id="match-table-body">
      </tbody>
    </table>
  </div>

  <div class="subtitle" id="api-status" style="font-size:12px;color:#4dd0a8;min-height:18px;margin-top:18px;">正在加载联赛目录...</div>

  <div class="footer" id="footer">数据来源：football-data.co.uk · 全球 27 国联赛 2014 起</div>
</div>

<!-- 联赛选择器弹层 -->
<div class="league-overlay" id="league-overlay" onclick="if(event.target===this)closeLeaguePanel()">
  <div class="league-panel" role="dialog" aria-label="选择联赛">
    <div class="league-panel-head">
      <span>选择联赛 · 27 国 38 项赛事</span>
      <button type="button" class="league-panel-close" onclick="closeLeaguePanel()" aria-label="关闭">✕</button>
    </div>
    <div class="league-panel-body" id="league-panel-body"></div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
// 联赛数据按需懒加载：leagues.js（目录）启动加载，data/{code}.js 选中时加载，
// football_latest.js（全部联赛当前赛季增量）按联赛码暂存，联赛数据加载后合并。
const allData = {};              // 已加载联赛缓存 {code: {code,name,cn,season_type,matches}}
const latestByLeague = {};       // 增量数据按联赛码分组暂存
let latestMeta = null;           // {count, updated_at}
const leagueMetaMap = {};        // code -> manifest 条目

let currentLeague = 'E0';
let currentSeason = 'all';
let leagueLoadToken = 0;         // 防止快速切换联赛时的异步竞态
const resultLabels = {'B': '庄', 'P': '闲', 'T': '和'};

// 赛季显示：跨年联赛 "2014" -> "2014-15"；自然年联赛 "2026" -> "2026"
function fmtSeason(y) {
  const n = parseInt(y, 10);
  if (isNaN(n)) return y;
  const meta = leagueMetaMap[currentLeague];
  if (meta && meta.season_type === 'calendar') return String(n);
  return n + '-' + String((n + 1) % 100).padStart(2, '0');
}

function getCurrentMatches() {
  if (!allData[currentLeague]) return [];
  return allData[currentLeague].matches.map((m, i) => ({...m, _idx: i, _league: currentLeague}));
}

function getFilteredMatches() {
  let seq = 0;
  const base = getCurrentMatches();
  return base.filter(m => {
    if (currentSeason === 'all') return true;
    return m.season === currentSeason;
  }).map(m => ({...m, _seq: seq++}));
}

function generateStandardRoad(results, maxRows = 6) {
  const grid = {};
  const cellMatches = {};
  let lastPos = null;
  let currentCol = -1;
  let pendingTies = [];

  results.forEach((r) => {
    const res = r.result;
    const ref = { idx: r._idx, seq: r._seq };
    if (res === 'T') {
      if (lastPos) {
        const key = lastPos.join(',');
        cellMatches[key] = cellMatches[key] || [];
        cellMatches[key].push(ref);
      } else {
        pendingTies.push(ref);
      }
      return;
    }

    if (Object.keys(grid).length === 0) {
      currentCol = 0;
      grid['0,0'] = res;
      lastPos = [0, 0];
      cellMatches['0,0'] = [ref, ...pendingTies];
      pendingTies = [];
      return;
    }

    const lastRes = grid[lastPos.join(',')];
    if (res === lastRes) {
      const [col, row] = lastPos;
      let newRow = row + 1;
      while (newRow < maxRows && grid[col + ',' + newRow]) newRow++;
      if (newRow < maxRows && !grid[col + ',' + newRow]) {
        grid[col + ',' + newRow] = res;
        lastPos = [col, newRow];
        cellMatches[col + ',' + newRow] = [ref];
      } else {
        let newCol = col + 1;
        while (grid[newCol + ',' + row]) newCol++;
        grid[newCol + ',' + row] = res;
        lastPos = [newCol, row];
        cellMatches[newCol + ',' + row] = [ref];
      }
    } else {
      const newCol = currentCol + 1;
      grid[newCol + ',0'] = res;
      lastPos = [newCol, 0];
      currentCol = newCol;
      cellMatches[newCol + ',0'] = [ref];
    }
  });

  if (pendingTies.length > 0 && Object.keys(grid).length === 0) {
    grid['0,0'] = 'T';
    lastPos = [0, 0];
    cellMatches['0,0'] = pendingTies;
  }

  return { grid, cellMatches };
}

function getTooltipContent(refs) {
  return refs.map(ref => {
    const league = ref._league || currentLeague;
    const m = allData[league].matches[ref.idx];
    const label = resultLabels[m.result];
    const cls = 'result-' + m.result;
    return `<div class="match-row">
      <div class="match-date">#${ref.seq + 1} · ${m.date}</div>
      <div>${m.team1_cn} ${m.s1}–${m.s2} ${m.team2_cn} <span class="${cls}">[${label}]</span></div>
    </div>`;
  }).join('');
}

function renderRoadInto(roadEl, matches, league) {
  const roadData = generateStandardRoad(matches);

  const grid = roadData.grid;
  const cellMatches = roadData.cellMatches;

  let maxCol = 0, maxRow = 0;
  for (const key in grid) {
    const [c, r] = key.split(',').map(Number);
    maxCol = Math.max(maxCol, c);
    maxRow = Math.max(maxRow, r);
  }

  roadEl.style.gridTemplateColumns = `repeat(${maxCol + 1}, 40px)`;
  roadEl.style.gridTemplateRows = `repeat(${maxRow + 1}, 40px)`;
  roadEl.innerHTML = '';

  for (let r = 0; r <= maxRow; r++) {
    for (let c = 0; c <= maxCol; c++) {
      const key = c + ',' + r;
      const cell = document.createElement('div');
      cell.className = 'cell';

      if (grid[key]) {
        const circle = document.createElement('div');
        circle.className = 'cell-circle cell-' + grid[key];
        circle.textContent = grid[key];
        cell.appendChild(circle);

        const refs = cellMatches[key] || [];
        const mainRef = refs[0];
        const tieRefs = refs.slice(1).filter(ref => allData[league].matches[ref.idx].result === 'T');

        // tooltip 显示该单元格所有相关比赛（包括和局）
        const tooltipRefs = refs;
        if (mainRef !== undefined) {
          circle.addEventListener('mouseenter', (e) => {
            if (isRecentTouch()) return;
            tooltipPinned = false;
            showTooltip(e, tooltipRefs);
          });
          circle.addEventListener('mousemove', (e) => {
            if (isRecentTouch() || tooltipPinned) return;
            moveTooltip(e);
          });
          circle.addEventListener('mouseleave', () => {
            if (isRecentTouch() || tooltipPinned) return;
            hideTooltip();
          });
          // 点击（手机触摸）切换显示/隐藏
          circle.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleTooltipAt(e, tooltipRefs);
          });
        }

        // 显示和局斜杠（叠加在庄/闲格上）
        const tieCount = tieRefs.length;
        const maxVisible = 4;
        const visibleCount = Math.min(tieCount, maxVisible);

        // 根据和局数量动态调整斜杠长度/角度，防止过多时溢出或重叠
        const lineWidth = tieCount >= 4 ? '64%' : '76%';
        const lineLeft = tieCount >= 4 ? '18%' : '12%';
        const angleStep = tieCount <= 2 ? 35 : (tieCount <= 3 ? 23 : 20);
        const startAngle = tieCount <= 2 ? -27 : (tieCount <= 3 ? -22 : -18);
        const offsetStep = tieCount >= 4 ? 2.5 : 3.5;

        tieRefs.forEach((ref, i) => {
          if (i >= maxVisible) return;
          const slash = document.createElement('div');
          slash.className = 'cell-tie';
          const line = document.createElement('div');
          line.className = 'cell-tie-line';
          const angle = startAngle - (i * angleStep);
          const offset = (i - (visibleCount - 1) / 2) * offsetStep;
          line.style.width = lineWidth;
          line.style.left = lineLeft;
          line.style.transform = `rotate(${angle}deg) translateY(${offset}px)`;
          line.addEventListener('mouseenter', (e) => {
            if (isRecentTouch()) return;
            tooltipPinned = false;
            showTooltip(e, [ref]);
          });
          line.addEventListener('mousemove', (e) => {
            if (isRecentTouch() || tooltipPinned) return;
            moveTooltip(e);
          });
          line.addEventListener('mouseleave', () => {
            if (isRecentTouch() || tooltipPinned) return;
            hideTooltip();
          });
          line.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleTooltipAt(e, [ref]);
          });
          slash.appendChild(line);
          cell.appendChild(slash);
        });

        // 超过显示上限时添加 +N 角标
        if (tieCount > maxVisible) {
          const badge = document.createElement('div');
          badge.className = 'cell-tie-badge';
          badge.textContent = '+' + (tieCount - maxVisible);
          cell.appendChild(badge);
        }
      }

      roadEl.appendChild(cell);
    }
  }
}

function renderRoad() {
  renderRoadInto(document.getElementById('road'), getFilteredMatches(), currentLeague);
  hideTooltip();
  // 渲染完成后立即定位到最新比赛（路图按时间从左到右排列，即滚动到最右端）
  requestAnimationFrame(() => {
    const wrapper = document.getElementById('single-road-wrapper');
    wrapper.scrollLeft = wrapper.scrollWidth;
  });
}

const tooltip = document.getElementById('tooltip');

let tooltipPinned = false;   // 点击固定状态（手机端）
let tooltipKey = null;       // 当前固定 tooltip 对应的格子标识
let lastTouchTs = 0;         // 最近一次触摸时间，用于在触屏上抑制 hover

document.addEventListener('touchstart', () => { lastTouchTs = Date.now(); }, { passive: true, capture: true });
function isRecentTouch() {
  return Date.now() - lastTouchTs < 700;
}

// 触摸滚动页面/路图时关闭 tooltip
document.addEventListener('touchmove', () => {
  if (tooltip.style.display === 'block') hideTooltip();
}, { passive: true });

// 点击页面其他任何地方关闭 tooltip（格子上的 click 已 stopPropagation）
document.addEventListener('click', (e) => {
  if (tooltip.style.display !== 'block') return;
  if (tooltip.contains(e.target)) return;
  hideTooltip();
});

function refsKey(refs) {
  return refs.map(r => r.idx + ':' + r.seq).join('|');
}

function toggleTooltipAt(e, refs) {
  const key = refsKey(refs);
  if (tooltipPinned && tooltipKey === key && tooltip.style.display === 'block') {
    hideTooltip();
    return;
  }
  tooltipPinned = true;
  tooltipKey = key;
  showTooltip(e, refs);
}

function showTooltip(e, refs) {
  tooltip.innerHTML = '<button type="button" class="tooltip-close" aria-label="关闭">✕</button>' + getTooltipContent(refs);
  tooltip.querySelector('.tooltip-close').addEventListener('click', (ev) => {
    ev.stopPropagation();
    hideTooltip();
  });
  tooltip.style.display = 'block';
  tooltip.classList.toggle('sticky', tooltipPinned);
  moveTooltip(e);
}

function moveTooltip(e) {
  const rect = tooltip.getBoundingClientRect();
  const winW = window.innerWidth;
  const winH = window.innerHeight;
  let finalX = e.clientX + 15;
  let finalY = e.clientY + 15;
  if (finalX + rect.width > winW - 8) finalX = e.clientX - rect.width - 10;
  if (finalY + rect.height > winH - 8) finalY = e.clientY - rect.height - 10;
  // 视口边界约束，保证不超出屏幕边缘
  finalX = Math.max(8, Math.min(finalX, winW - rect.width - 8));
  finalY = Math.max(8, Math.min(finalY, winH - rect.height - 8));
  tooltip.style.left = finalX + 'px';
  tooltip.style.top = finalY + 'px';
}

function hideTooltip() {
  tooltip.style.display = 'none';
  tooltip.classList.remove('sticky');
  tooltipPinned = false;
  tooltipKey = null;
}

function setSeason(season) {
  currentSeason = season;
  renderAll();
}

function populateSeasonSelect() {
  const select = document.getElementById('season-select');
  while (select.options.length > 1) {
    select.remove(1);
  }
  if (!allData[currentLeague]) return;
  const years = [...new Set(allData[currentLeague].matches.map(m => m.season))].sort();
  years.forEach(y => {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = fmtSeason(y) + ' 赛季';
    select.appendChild(opt);
  });
}

// 切换联赛：懒加载数据文件后渲染（带竞态保护）
async function setLeague(league) {
  closeLeaguePanel();
  if (league === currentLeague && allData[league]) return;
  const token = ++leagueLoadToken;
  currentLeague = league;
  currentSeason = 'all';
  updateLeagueButton();

  const statusEl = document.getElementById('api-status');
  let merge = null;
  try {
    merge = await ensureLeagueLoaded(league);
  } catch (err) {
    if (token !== leagueLoadToken) return;
    statusEl.textContent = '❌ 联赛数据加载失败（' + err.message + '）。请确认 data/' + league + '.js 存在。';
    statusEl.style.color = '#ff6b6b';
    return;
  }
  if (token !== leagueLoadToken) return;  // 加载期间又切换了其他联赛

  document.getElementById('season-select').value = 'all';
  populateSeasonSelect();
  updatePageInfo();

  statusEl.style.color = '#4dd0a8';
  let msg = leagueMetaMap[league].flag + ' ' + allData[league].cn + ' 共 ' + allData[league].matches.length + ' 场';
  if (merge && (merge.added > 0 || merge.updated > 0)) {
    msg += ' · 最新战绩新增 ' + merge.added + '、更新 ' + merge.updated;
  }
  if (latestMeta && latestMeta.updated_at) {
    msg += ' · 更新时间：' + new Date(latestMeta.updated_at).toLocaleString('zh-CN');
  }
  statusEl.textContent = '✅ ' + msg;

  renderAll();
}

function renderStats() {
  const filtered = getFilteredMatches();
  const counts = { B: 0, P: 0, T: 0 };
  for (const m of filtered) counts[m.result]++;
  document.getElementById('stat-b').textContent = counts.B;
  document.getElementById('stat-p').textContent = counts.P;
  document.getElementById('stat-t').textContent = counts.T;
  document.getElementById('stat-total').textContent = filtered.length;
}

function renderTable() {
  // 最近的比赛排在最上面
  const filtered = getFilteredMatches().slice().reverse();
  const tbody = document.getElementById('match-table-body');
  tbody.innerHTML = '';
  let lastGroup = '';
  filtered.forEach((m, i) => {
    const year = m.date.split('-')[0];
    const groupLabel = year + ' 年';
    if (currentSeason === 'all' && year !== lastGroup) {
      const sep = document.createElement('tr');
      sep.className = 'year-separator';
      sep.innerHTML = `<td colspan="7">${groupLabel}</td>`;
      tbody.appendChild(sep);
      lastGroup = year;
    }
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${i + 1}</td><td>${year}</td><td>${m.date}</td><td>${m.team1_cn}</td><td>${m.s1}–${m.s2}</td><td>${m.team2_cn}</td><td class="result-${m.result}">${resultLabels[m.result]}</td>`;
    tbody.appendChild(tr);
  });
}

function updatePageInfo() {
  const leagueInfo = allData[currentLeague];
  if (!leagueInfo) return;
  document.getElementById('page-title').textContent = leagueInfo.cn;
  document.title = leagueInfo.cn + ' · 赛果路图';
  document.getElementById('footer').textContent =
    '数据来源：football-data.co.uk · 全球 27 国联赛 2014 起 · ' + leagueInfo.cn + ' 共 ' + leagueInfo.matches.length + ' 场比赛';
}

function renderAll() {
  renderRoad();
  renderStats();
  renderTable();
}

// 通过 <script> 标签加载数据文件（兼容 file:// 直接双击打开，浏览器不限制 script src）
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src + '?_=' + Date.now();
    s.onload = () => resolve();
    s.onerror = () => reject(new Error('无法加载 ' + src));
    document.head.appendChild(s);
  });
}

// ===== 联赛选择器弹层 =====
function updateLeagueButton() {
  const meta = leagueMetaMap[currentLeague];
  const btn = document.getElementById('league-btn');
  if (meta) {
    btn.innerHTML = meta.flag + ' ' + meta.cn + ' <span class="lb-en">' + meta.name + '</span>';
  }
}

function buildLeaguePanel() {
  const body = document.getElementById('league-panel-body');
  body.innerHTML = '';
  let lastGroup = null;
  let grid = null;
  (window.LEAGUES_MANIFEST || []).forEach(meta => {
    leagueMetaMap[meta.code] = meta;
    if (meta.group !== lastGroup) {
      const h = document.createElement('div');
      h.className = 'league-group-title';
      h.textContent = meta.group;
      body.appendChild(h);
      grid = document.createElement('div');
      grid.className = 'league-grid';
      body.appendChild(grid);
      lastGroup = meta.group;
    }
    const item = document.createElement('div');
    item.className = 'league-item' + (meta.code === currentLeague ? ' active' : '');
    item.dataset.code = meta.code;
    item.innerHTML = '<span class="lflag">' + meta.flag + '</span>' +
      '<span class="ltext"><span class="lcn">' + meta.cn + '</span>' +
      '<span class="len">' + meta.country_cn + ' · ' + meta.name + '</span></span>' +
      '<span class="lcount">' + (meta.matches > 0 ? meta.matches + ' 场' : '') + '</span>';
    item.addEventListener('click', () => { setLeague(meta.code); });
    grid.appendChild(item);
  });
}

function openLeaguePanel() {
  // 同步高亮当前联赛
  document.querySelectorAll('.league-item').forEach(el => {
    el.classList.toggle('active', el.dataset.code === currentLeague);
  });
  document.getElementById('league-overlay').classList.add('open');
}

function closeLeaguePanel() {
  document.getElementById('league-overlay').classList.remove('open');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeLeaguePanel();
});

// ===== 数据加载 =====
// 加载 update_scores.py 生成的最新战绩（football_latest.js -> window.LATEST_DATA），按联赛码暂存
async function loadLatestData() {
  try {
    await loadScript('football_latest.js');
    const data = window.LATEST_DATA;
    if (!data || !Array.isArray(data.matches)) {
      throw new Error('数据格式不正确');
    }
    data.matches.forEach(m => {
      if (!m._league) return;
      (latestByLeague[m._league] = latestByLeague[m._league] || []).push(m);
    });
    latestMeta = { count: data.matches.length, updated_at: data.updated_at || null };
  } catch (err) {
    latestMeta = null;
    console.log('加载最新数据失败:', err.message);
  }
}

// 把暂存的增量数据合并进指定联赛（日期+主队+客队为唯一键去重），返回 {added, updated}
function mergeLatestInto(league) {
  const list = latestByLeague[league];
  if (!list || !allData[league]) return { added: 0, updated: 0 };
  const matches = allData[league].matches;
  const idx = new Map();
  matches.forEach((m, i) => idx.set(m.date + '|' + m.team1 + '|' + m.team2, i));

  let added = 0, updated = 0;
  list.forEach(m => {
    const key = m.date + '|' + m.team1 + '|' + m.team2;
    if (idx.has(key)) {
      matches[idx.get(key)] = { ...matches[idx.get(key)], ...m };
      updated++;
    } else {
      matches.push(m);
      added++;
    }
  });
  matches.sort((a, b) => new Date(a.date) - new Date(b.date));
  return { added, updated };
}

// 懒加载单个联赛数据文件（data/{code}.js -> window.LEAGUE_DATA），内存缓存
async function ensureLeagueLoaded(code) {
  if (allData[code]) return { added: 0, updated: 0 };
  const statusEl = document.getElementById('api-status');
  const meta = leagueMetaMap[code];
  statusEl.style.color = '#4dd0a8';
  statusEl.textContent = '⏳ 正在加载 ' + (meta ? meta.cn : code) + ' 历史数据...';
  await loadScript('data/' + code + '.js');
  const d = window.LEAGUE_DATA;
  if (!d || d.code !== code || !Array.isArray(d.matches)) {
    throw new Error('data/' + code + '.js 数据格式不正确');
  }
  allData[code] = d;
  return mergeLatestInto(code);
}

async function initApp() {
  const statusEl = document.getElementById('api-status');
  try {
    await loadScript('leagues.js');
    if (!Array.isArray(window.LEAGUES_MANIFEST) || window.LEAGUES_MANIFEST.length === 0) {
      throw new Error('leagues.js 中未找到 LEAGUES_MANIFEST');
    }
    buildLeaguePanel();
  } catch (err) {
    statusEl.textContent = '❌ 无法加载 leagues.js 联赛目录（' + err.message + '）。请先运行 fetch_history.py 生成数据文件。';
    statusEl.style.color = '#ff6b6b';
    console.error('加载联赛目录失败:', err);
    return;
  }
  updateLeagueButton();
  statusEl.textContent = '正在检查最新战绩数据...';
  await loadLatestData();
  await setLeague(currentLeague);
}

initApp();
</script>
</body>
</html>
